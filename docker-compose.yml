services:

  client:
    build: ./client
    container_name: subly-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - subly-network

  server:
    build: ./server
    container_name: subly-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
    networks:
      - subly-network

  mongodb:
    image: mongo:7.0
    container_name: subly-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: subly
      MONGO_INITDB_ROOT_PASSWORD: subly
      MONGO_INITDB_DATABASE: subly
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - subly-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  subly-network:
    driver: bridge
