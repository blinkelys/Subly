services:
  client:
    build: ./client
    container_name: subly-client
    restart: unless-stopped
    networks:
      - subly-network

  nginx:
    image: nginx:alpine
    container_name: subly-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/nginx-cloudflare.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - subly-network

  server:
    build: ./server
    container_name: subly-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
    networks:
      - subly-network

  mongodb:
    image: mongo:4.4
    container_name: subly-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: subly
      MONGO_INITDB_ROOT_PASSWORD: subly
      MONGO_INITDB_DATABASE: subly
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - subly-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  subly-network:
    driver: bridge
